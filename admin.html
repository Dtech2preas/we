<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Crunchyroll Bot</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #121212;
      color: #ffffff;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: #1e1e1e;
      padding: 20px;
      border-radius: 10px;
    }
    h1, h2 {
      color: #f47521;
    }
    .stats {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }
    .stat-box {
      background: #2c2c2c;
      padding: 15px;
      border-radius: 8px;
      flex: 1;
      text-align: center;
    }
    .stat-box span {
      display: block;
      font-size: 24px;
      font-weight: bold;
      color: #f47521;
    }
    textarea {
      width: 100%;
      height: 100px;
      background: #2c2c2c;
      color: white;
      border: 1px solid #444;
      padding: 10px;
      border-radius: 5px;
      margin-bottom: 10px;
    }
    button {
      background: #f47521;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      background: #cc5e15;
    }
    .fetched-list {
      margin-top: 20px;
    }
    .account-item {
      background: #2c2c2c;
      padding: 10px;
      border-radius: 5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .actions button {
      margin-left: 10px;
    }
    .btn-delete {
      background: #ef4444;
    }
    .btn-delete:hover {
      background: #dc2626;
    }
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 60vh;
    }
    #login-screen input {
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 5px;
      border: 1px solid #444;
      background: #2c2c2c;
      color: white;
      width: 250px;
    }
    #admin-panel {
      display: none;
    }
    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #333;
      color: white;
      padding: 10px 20px;
      border-radius: 5px;
      border-left: 4px solid #f47521;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div id="login-screen">
    <h2>Admin Login</h2>
    <input type="password" id="admin-secret" placeholder="Enter Admin Secret">
    <button onclick="login()">Login</button>
  </div>

  <div id="admin-panel" class="container">
    <h1>Crunchyroll Bot - Admin Panel</h1>
    <button onclick="logout()" style="float: right; background: #555;">Logout</button>

    <div class="stats">
      <div class="stat-box">
        Available Accounts
        <span id="available-count">0</span>
      </div>
      <div class="stat-box">
        Fetched Accounts
        <span id="fetched-count">0</span>
      </div>
    </div>

    <h2>Add New Accounts</h2>
    <p style="font-size: 0.9rem; color: #aaa;">Enter accounts (plain email:pass or D-TECH format)</p>
    <textarea id="new-accounts" placeholder="user1@email.com:pass1&#10;user2@email.com:pass2&#10;or paste D-TECH format directly..."></textarea>
    <button onclick="addAccounts()">Add Accounts</button>

    <div class="fetched-list">
      <h2>Fetched Accounts</h2>
      <div id="fetched-container">
        <!-- Accounts will be populated here -->
      </div>
    </div>
  </div>

  <div id="toast" class="toast">Message</div>

  <script>
    const API_URL = "https://odd-frost-4acc.lefamochobane2.workers.dev";
    let secret = "";

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.innerText = msg;
      toast.style.opacity = 1;
      setTimeout(() => toast.style.opacity = 0, 3000);
    }

    async function login() {
      const input = document.getElementById('admin-secret').value;
      secret = input;

      // Test credentials
      try {
        const res = await fetch(`${API_URL}/admin/stats?secret=${encodeURIComponent(secret)}`);
        if (res.ok) {
          document.getElementById('login-screen').style.display = 'none';
          document.getElementById('admin-panel').style.display = 'block';
          loadData();
        } else {
          showToast('Invalid Secret');
        }
      } catch (e) {
        showToast('Connection Error');
      }
    }

    function logout() {
      secret = "";
      document.getElementById('admin-secret').value = "";
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('admin-panel').style.display = 'none';
    }

    async function loadData() {
      await loadStats();
      await loadFetched();
    }

    async function loadStats() {
      try {
        const res = await fetch(`${API_URL}/admin/stats?secret=${encodeURIComponent(secret)}`);
        if (res.ok) {
          const data = await res.json();
          document.getElementById('available-count').innerText = data.available_count;
          document.getElementById('fetched-count').innerText = data.fetched_count;
        }
      } catch (e) { console.error(e); }
    }

    async function loadFetched() {
      try {
        const res = await fetch(`${API_URL}/admin/fetched?secret=${encodeURIComponent(secret)}`);
        if (res.ok) {
          const data = await res.json();
          renderFetched(data.fetched || []);
        }
      } catch (e) { console.error(e); }
    }

    function renderFetched(accounts) {
      const container = document.getElementById('fetched-container');
      container.innerHTML = '';
      if (accounts.length === 0) {
        container.innerHTML = '<p style="color: #aaa;">No fetched accounts yet.</p>';
        return;
      }

      accounts.forEach(acc => {
        const div = document.createElement('div');
        div.className = 'account-item';

        const textSpan = document.createElement('span');
        textSpan.innerText = acc;
        textSpan.style.fontFamily = 'monospace';

        const actionsDiv = document.createElement('div');
        actionsDiv.className = 'actions';

        const copyBtn = document.createElement('button');
        copyBtn.innerText = 'Copy';
        copyBtn.onclick = () => {
          navigator.clipboard.writeText(acc);
          showToast('Copied!');
        };

        const deleteBtn = document.createElement('button');
        deleteBtn.innerText = 'Delete';
        deleteBtn.className = 'btn-delete';
        deleteBtn.onclick = () => deleteFetched(acc);

        actionsDiv.appendChild(copyBtn);
        actionsDiv.appendChild(deleteBtn);

        div.appendChild(textSpan);
        div.appendChild(actionsDiv);
        container.appendChild(div);
      });
    }

    async function addAccounts() {
      const text = document.getElementById('new-accounts').value;
      if (!text.trim()) {
        showToast('Please enter some accounts');
        return;
      }

      const rawLines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
      const accounts = [];

      for (const line of rawLines) {
        if (line.startsWith('======') || line.startsWith('[ Powered by') || line === ')' || line === '(') {
          continue;
        }

        if (line.includes('| Data:')) {
          const parts = line.split('|');
          const emailPass = parts[0].trim();

          let dataContent = line.substring(line.indexOf('Data:') + 5).trim();
          // Remove the DTECH signature to check what's left
          dataContent = dataContent.split(/\(?powered by DTECH/i)[0].trim();

          // Only keep if data content is not empty and doesn't contain the verification link message
          if (dataContent !== '' && !dataContent.toLowerCase().includes('on the verification link')) {
            if (emailPass.includes(':')) {
              accounts.push(emailPass);
            }
          }
        } else {
          // Plain format fallback
          if (line.includes(':') && !line.toLowerCase().includes('powered by')) {
            accounts.push(line);
          }
        }
      }

      if (accounts.length === 0) {
        showToast('No valid accounts found after filtering');
        return;
      }

      try {
        const res = await fetch(`${API_URL}/admin/add-accounts`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ admin_secret: secret, accounts: accounts })
        });

        if (res.ok) {
          showToast('Accounts added successfully!');
          document.getElementById('new-accounts').value = '';
          loadStats();
        } else {
          showToast('Failed to add accounts');
        }
      } catch (e) {
        showToast('Error adding accounts');
      }
    }

    async function deleteFetched(account) {
      if (!confirm(`Delete ${account} from fetched list?`)) return;

      try {
        const res = await fetch(`${API_URL}/admin/delete-fetched`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ admin_secret: secret, account })
        });

        if (res.ok) {
          showToast('Account deleted');
          loadData(); // reload
        } else {
          showToast('Failed to delete account');
        }
      } catch (e) {
        showToast('Error deleting account');
      }
    }
  </script>
</body>
</html>
